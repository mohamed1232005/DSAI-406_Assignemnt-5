# .github/workflows/pipeline.yml
name: ML Validate and Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:

  # ── JOB 1: VALIDATE 
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run:  |
          pip install -r requirements.txt
          pip install mlflow

     
      # In a real project, this would be: dvc pull
      - name: Pull Data (DVC simulated)
        run: |
          echo "Simulating dvc pull..."
          echo "Dataset ready: Iris dataset (built into sklearn, no download needed)"

      - name: Train Model and Log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          # If no secret is set, fall back to local SQLite tracking
          if [ -z "$MLFLOW_TRACKING_URI" ]; then
            export MLFLOW_TRACKING_URI="sqlite:///mlflow.db"
            echo "No MLFLOW_TRACKING_URI secret found, using local SQLite."
          fi
          python train.py --fail 

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: |
           model_info.txt
           accuracy.txt

  # ── JOB 2: DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: validate          # only runs if validate job succeeds

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install mlflow


      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Show Run ID
        run: |
          echo "Model Run ID is: $(cat model_info.txt)."

      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          if [ -z "$MLFLOW_TRACKING_URI" ]; then
            export MLFLOW_TRACKING_URI="sqlite:///mlflow.db"
          fi
          python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          echo "docker build --build-arg RUN_ID=$(cat model_info.txt) -t ml-model:$(cat model_info.txt) ."
          echo "Docker build complete. Image ready for deployment."
